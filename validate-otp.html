<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification - M.I.A Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div class="center-screen">
  <div class="card">

    <div class="page-intro-logo" style="margin: 0 auto 20px;">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
        <path d="M5 28V8L12 17L18 8L24 17L31 8V28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="5"  cy="8"  r="1.8" fill="white"/>
        <circle cx="18" cy="8"  r="1.8" fill="white"/>
        <circle cx="31" cy="8"  r="1.8" fill="white"/>
        <circle cx="5"  cy="28" r="1.8" fill="white"/>
        <circle cx="31" cy="28" r="1.8" fill="white"/>
        <line x1="5"  y1="8" x2="5"  y2="28" stroke="white" stroke-width="1" opacity="0.4"/>
        <line x1="31" y1="8" x2="31" y2="28" stroke="white" stroke-width="1" opacity="0.4"/>
      </svg>
    </div>

    <div class="brand">OTP Verification</div>
    <p class="muted">We've sent a code. Enter it below to verify your identity.</p>
    <p class="muted">Code sent to: <strong id="otpTarget"></strong></p>

    <div class="otp-box">
      <input maxlength="1" class="otp" id="otp1" inputmode="numeric">
      <input maxlength="1" class="otp" id="otp2" inputmode="numeric">
      <input maxlength="1" class="otp" id="otp3" inputmode="numeric">
      <input maxlength="1" class="otp" id="otp4" inputmode="numeric">
      <input maxlength="1" class="otp" id="otp5" inputmode="numeric">
      <input maxlength="1" class="otp" id="otp6" inputmode="numeric">
    </div>

    <div id="error-message" class="feedback-error"></div>
    <div id="success-message" class="feedback-success"></div>

    <button class="btn primary" onclick="validateOtp()">Verify OTP</button>
    <a class="link" href="index.html">Back</a>
    <p id="message" class="muted center"></p>
  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
