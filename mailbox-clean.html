<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.I.A Mailbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="assets/styles.css">
</head>

<body>
    <div class="mailbox-container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo" onclick="toggleSidebar()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <line x1="9" y1="3" x2="9" y2="21" />
                    </svg>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-item active" onclick="filterFolder('inbox')">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                    </span>
                    <span class="nav-label">Inbox</span>
                    <span class="nav-badge">3</span>
                </div>
                <div class="nav-item" onclick="filterFolder('sent')">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </span>
                    <span class="nav-label">Sent</span>
                </div>
                <div class="nav-item" onclick="filterFolder('drafts')">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                        </svg>
                    </span>
                    <span class="nav-label">Drafts</span>
                    <span class="nav-badge">2</span>
                </div>
                <div class="nav-item" onclick="filterFolder('archived')">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="21 8 21 21 3 21 3 8" />
                            <rect x="1" y="3" width="22" height="5" />
                            <line x1="10" y1="12" x2="14" y2="12" />
                        </svg>
                    </span>
                    <span class="nav-label">Archive</span>
                </div>
                <div class="nav-item" onclick="filterFolder('spam')">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        </svg>
                    </span>
                    <span class="nav-label">Spam</span>
                </div>
                <div class="nav-item" onclick="filterFolder('trash')">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                    </span>
                    <span class="nav-label">Trash</span>
                </div>
            </nav>

            <div class="sidebar-bottom">
                <button class="sidebar-btn" title="Compose" onclick="openCompose()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                </button>
                <button class="sidebar-btn" title="Logout" onclick="openLogoutModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Email List Panel -->
        <section class="email-list-panel">
            <div class="panel-header">
                <div class="search-bar">
                    <span class="search-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </span>
                    <input type="text" class="search-input" placeholder="Search emails..."
                        onkeyup="searchEmails(event)">
                </div>
                <button class="search-btn-small" onclick="focusSearch()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </button>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="filterTab(event, 'all')">All</div>
                <div class="tab" onclick="filterTab(event, 'unread')">Unread</div>
                <div class="tab" onclick="filterTab(event, 'starred')">Starred</div>
            </div>

            <div class="email-list" id="emailList">
                <!-- Emails will be rendered here -->
            </div>
        </section>

        <!-- Email Detail Panel -->
        <main class="detail-panel">
            <div class="detail-header">
                <div class="detail-actions">
                    <button class="detail-action-btn" title="Delete">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                    </button>
                    <button class="detail-action-btn" title="Archive">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 8v13H3V8" />
                            <path d="M1 3h22v5H1z" />
                            <path d="M12 12v6" />
                            <path d="M8 14l4 4 4-4" />
                        </svg>
                    </button>
                    <button class="detail-action-btn" id="markUnreadBtn" title="Mark as unread">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                    </button>
                    <button class="detail-action-btn" id="starBtn" title="Not Starred" onclick="toggleStar(this)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon
                                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                        </svg>
                    </button>
                </div>
                <div class="detail-info">
                    <span class="detail-subtitle">Inbox</span>
                </div>
            </div>

            <div class="detail-content" id="emailDetail">
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                    </div>
                    <p class="empty-text">Select an email to read</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Compose Modal -->
    <div class="compose-modal" id="composeModal">
        <div class="compose-container">
            <div class="compose-header">
                <h2>New Message</h2>
                <button class="close-btn" onclick="closeCompose()">×</button>
            </div>
            <div class="compose-body">
                <div class="form-group">
                    <label>To</label>
                    <input type="email" class="form-input" id="composeTo" placeholder="recipient@example.com">
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" class="form-input" id="composeSubject" placeholder="Email subject">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea class="form-textarea" id="composeBody" placeholder="Write your message..."></textarea>
                </div>
            </div>
            <div class="compose-toolbar">
                <button class="toolbar-btn" title="Formatting options">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 7V4h16v3" />
                        <path d="M9 20h6" />
                        <path d="M12 4v16" />
                    </svg>
                </button>
                <button class="toolbar-btn" title="Attach files">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                    </svg>
                </button>
                <button class="toolbar-btn" title="Insert link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                    </svg>
                </button>
                <button class="toolbar-btn" title="Insert emoji">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                        <line x1="9" y1="9" x2="9.01" y2="9" />
                        <line x1="15" y1="9" x2="15.01" y2="9" />
                    </svg>
                </button>
                <button class="toolbar-btn" title="Insert photo">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                </button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" title="More options">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="5" r="1" />
                        <circle cx="12" cy="12" r="1" />
                        <circle cx="12" cy="19" r="1" />
                    </svg>
                </button>
                <button class="toolbar-btn delete-btn" title="Discard draft" onclick="closeCompose()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    </svg>
                </button>
            </div>
            <div class="compose-actions">
                <div class="send-btn-wrapper">
                    <button class="btn btn-primary" onclick="sendEmail()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Logout Confirmation Modal -->
    <div id="logoutModal" class="compose-modal">
      <div class="compose-container" style="max-width: 420px;">
        
        <div class="compose-header">
          <h2>Confirm Logout</h2>
          <button class="close-btn" onclick="closeLogoutModal()">×</button>
        </div>

        <div class="compose-body">
          <p style="color:#a1a1aa; font-size:14px;">
            Are you sure you want to log out of your account?
          </p>
        </div>

        <div class="compose-actions">
          <button class="btn btn-secondary" onclick="closeLogoutModal()">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="confirmLogout()">
            Logout
          </button>
        </div>

      </div>
    </div>

    <script src="assets/app.js"></script>

        <!-- AI Chatbot Floating Button -->
    <a href="ai-chatbot.html" class="ai-chatbot-btn" title="Ask MIA AI">
        <div class="ai-logo">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Robotic M Letter -->
                <path d="M8 38V10L16 22L24 10L32 22L40 10V38" stroke="url(#ai-gradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <!-- Circuit lines -->
                <circle cx="8" cy="10" r="2" fill="#22c55e"/>
                <circle cx="24" cy="10" r="2" fill="#22c55e"/>
                <circle cx="40" cy="10" r="2" fill="#22c55e"/>
                <circle cx="8" cy="38" r="2" fill="#22c55e"/>
                <circle cx="40" cy="38" r="2" fill="#22c55e"/>
                <!-- Connection lines -->
                <line x1="8" y1="10" x2="8" y2="38" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
                <line x1="40" y1="10" x2="40" y2="38" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
                <defs>
                    <linearGradient id="ai-gradient" x1="8" y1="10" x2="40" y2="38" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#22c55e"/>
                        <stop offset="1" stop-color="#16a34a"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <span class="ai-tooltip">Ask AI</span>
    </a>
    
</body>

</html>
