<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Verification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.1.1/css/intlTelInput.min.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>

<body>

  <div class="center-screen">
    <div class="card">
      <div class="brand">Phone Verification</div>
      <h1>Send OTP to Phone Number</h1>
      <p class="muted">Enter your phone number to receive a one-time verification code</p>

      <!-- Tab Switcher -->
      <div class="tab-switcher">
        <a href="otp-email.html" class="tab-btn">Email</a>
        <a href="otp-phone.html" class="tab-btn active">Phone</a>
      </div>

      <!-- Phone Input -->
      <div class="phone-input-container">
        <div class="phone-input-wrapper">
          <button class="country-selector" onclick="toggleCountryDropdown()">
            <div class="country-flag" id="country-flag"></div>
            <span class="country-code" id="country-code">+1</span>
            <svg class="dropdown-arrow" id="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 9l6 6 6-6" />
            </svg>
          </button>
          <input id="phone" type="tel" class="phone-input" placeholder="Phone Number">
        </div>

        <!-- Country Dropdown (Hidden by default) -->
        <div id="country-dropdown" class="country-dropdown">
          <div class="search-container">
            <input type="text" class="search-input" id="search-input" placeholder="Search countries..."
              oninput="filterCountries()">
          </div>
          <div class="country-list" id="country-list"></div>
          <div class="no-results" id="no-results" style="display: none;">No countries found</div>
        </div>
      </div>

      <button id="btn" class="btn primary" onclick="sendPhoneOtp()">
        Send OTP
      </button>

      <!-- Messages -->
      <div id="error-message" style="color: #dc2626; font-size: 14px; margin-top: 10px; display: none;"></div>
      <div id="success-message" style="color: #22c55e; font-size: 14px; margin-top: 10px; display: none;"></div>


      <!-- Divider -->
      <div
        style="display: flex; align-items: center; gap: 16px; margin: 24px 0; color: #6b7280; font-size: 13px; text-transform: uppercase;">
        <div style="flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1);"></div>
        or continue with
        <div style="flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1);"></div>
      </div>


      <!-- Google Button -->
      <a href="google-login.html"
        style="display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px 24px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: #ffffff; font-size: 15px; font-weight: 500; text-decoration: none; transition: all 0.3s ease;">
        <img src="assets/Google_Favicon_2025.svg.webp" alt="Google" style="width: 20px; height: 20px;">
        Continue with Google
      </a>

      <a class="link" href="index.html">Back</a>
    </div>
  </div>

  <!-- Scripts -->
<script src="assets/app.js"></script>
</body>

</html>
