<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Verification - M.I.A Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.1.1/css/intlTelInput.min.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>

<body>

  <div class="center-screen">
    <div class="card">

      <!-- Intro -->
      <div class="page-intro">
        <div class="page-intro-logo">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
            <path d="M5 28V8L12 17L18 8L24 17L31 8V28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="5"  cy="8"  r="1.8" fill="white"/>
            <circle cx="18" cy="8"  r="1.8" fill="white"/>
            <circle cx="31" cy="8"  r="1.8" fill="white"/>
            <circle cx="5"  cy="28" r="1.8" fill="white"/>
            <circle cx="31" cy="28" r="1.8" fill="white"/>
            <line x1="5"  y1="8" x2="5"  y2="28" stroke="white" stroke-width="1" opacity="0.4"/>
            <line x1="31" y1="8" x2="31" y2="28" stroke="white" stroke-width="1" opacity="0.4"/>
          </svg>
        </div>
        <h2>Sign in to your account</h2>
        <p>Choose your preferred method below</p>
      </div>

      <!-- Tab Switcher -->
      <div class="tab-switcher">
        <a href="otp-email.html" class="tab-btn">Email</a>
        <a href="otp-phone.html" class="tab-btn active">Phone</a>
      </div>

      <div class="brand">Phone Verification</div>
      <p class="muted">Enter your phone number to receive a one-time verification code</p>

      <!-- Phone Input -->
      <div class="phone-input-container">
        <div class="phone-input-wrapper">
          <button class="country-selector" onclick="toggleCountryDropdown()">
            <div class="country-flag" id="country-flag"></div>
            <span class="country-code" id="country-code">+1</span>
            <svg class="dropdown-arrow" id="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 9l6 6 6-6" />
            </svg>
          </button>
          <input id="phone" type="tel" class="phone-input" placeholder="Phone Number">
        </div>

        <!-- Country Dropdown (Hidden by default) -->
        <div id="country-dropdown" class="country-dropdown">
          <div class="search-container">
            <input type="text" class="search-input" id="search-input" placeholder="Search countries..."
              oninput="filterCountries()">
          </div>
          <div class="country-list" id="country-list"></div>
          <div class="no-results" id="no-results" style="display: none;">No countries found</div>
        </div>
      </div>

      <!-- Messages -->
      <div id="error-message" class="feedback-error"></div>
      <div id="success-message" class="feedback-success"></div>

      <button id="btn" class="btn primary" onclick="sendPhoneOtp()">
        Send OTP
      </button>


      <!-- Divider -->
      <div class="divider">or continue with</div>

      <!-- Google Button -->
      <a href="google-login.html" class="btn-google">
        <img src="assets/Google_Favicon_2025.svg.webp" alt="Google" width="20" height="20">
        Continue with Google
      </a>

      <a class="link" href="index.html">Back</a>
    </div>
  </div>

  <!-- Scripts -->
<script src="assets/app.js"></script>
</body>

</html>
