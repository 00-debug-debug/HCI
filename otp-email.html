<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send OTP - M.I.A Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div class="center-screen">
  <div class="card">
    <div class="brand">Email Verification</div>
    <h1>Send OTP to Email</h1>
    <p class="muted">Enter your email address to receive a 6-digit code.</p>

    <!-- Tab Switcher -->
    <div class="tab-switcher">
      <a href="otp-email.html" class="tab-btn active">Email</a>
      <a href="otp-phone.html" class="tab-btn">Phone</a>
    </div>

    <label>Email Address</label>
    <input id="email" type="email" placeholder="example@company.com">

    <div id="error-message" style="color: #dc2626; font-size: 14px; margin-top: 10px; display: none;"></div>
    <div id="success-message" style="color: #22c55e; font-size: 14px; margin-top: 10px; display: none;"></div>

    <button class="btn primary" onclick="sendEmailOtp()">Send OTP</button>

    <!-- Divider -->
    <div style="display: flex; align-items: center; gap: 16px; margin: 24px 0; color: #6b7280; font-size: 13px; text-transform: uppercase;">
      <div style="flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1);"></div>
      or continue with
      <div style="flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1);"></div>
    </div>

    <!-- Google Button -->
    <a href="google-login.html" style="display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px 24px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: #ffffff; font-size: 15px; font-weight: 500; text-decoration: none; transition: all 0.3s ease;">
      <img src="assets/Google_Favicon_2025.svg.webp" alt="Google" style="width: 20px; height: 20px;">
      Continue with Google
    </a>

    <a class="link" href="index.html">Back</a>
  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
