<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - M.I.A Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0a0a0a,#1a1a1a);
    color:#fff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* BACKGROUND */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 50%, rgba(34,197,94,0.15), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(34,197,94,0.1), transparent 50%);
    z-index:0;
}

/* CARD */
.container {
  width: 100%;
  max-width: 480px;
  background: rgba(20,20,20,0.95);
  border-radius: 24px;
  padding: 40px;
  position: relative;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(34,197,94,0.3);
  z-index:1;
}

/* HEADER */
.header h1{
    font-size:30px;
    text-align:center;
}
.header p{
    text-align:center;
    color:#9ca3af;
    margin-bottom:25px;
}

/* TAB */
.tab-switcher{
    display:flex;
    background:rgba(255,255,255,0.05);
    border-radius:14px;
    padding:5px;
    margin-bottom:25px;
}

.tab-btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:transparent;
    color:#9ca3af;
    cursor:pointer;
}

.tab-btn.active{
    background:#22c55e;
    color:#000;
    font-weight:600;
}

/* INPUT */
.input-group{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.05);
    color:#fff;
}

/* BUTTON */
.btn-primary{
    width:100%;
    padding:14px;
    background:#22c55e;
    border:none;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
}

/* MESSAGE */
.message{
    display:none;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}
.success{background:#16a34a;}
.error{background:#dc2626;}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Sign in to your account</h1>
        <p>Choose your preferred method</p>
    </div>

    <!-- TABS -->
    <div class="tab-switcher">
        <button class="tab-btn active" onclick="goToPage('otp-email.html')">
            Email
        </button>

        <!-- PHONE TAB -->
        <!-- 🔥 CHANGE THIS FILE NAME IF NEEDED -->
        <button class="tab-btn" onclick="goToPage('otp-phone.html')">
            Phone
        </button>
    </div>

</div>

<script>

/// ==========================
/// NAVIGATION (OPTION 1 FIX)
/// ==========================

function goToPage(page){
    // 🔥 PUT YOUR HTML FILE NAMES HERE:
    // example:
    // email.html → email login page
    // phone.html → phone login page

    window.location.href = page;
}

/// ==========================
/// EMAIL OTP
/// ==========================

function sendEmailOtp(){
    const email = document.getElementById('email-input').value.trim();

    if(!email || !email.includes('@')){
        alert("Invalid email");
        return;
    }

    localStorage.setItem('otp_target', email);
    localStorage.setItem('otp_method', 'email');

    // 🔥 CHANGE THIS FILE NAME IF YOUR OTP PAGE IS DIFFERENT
    window.location.href = "validate-otp.html";
}

</script>

</body>
</html>
