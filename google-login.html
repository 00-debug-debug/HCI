<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login - M.I.A Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div class="center-screen">
  <div class="card">
    <img src="assets/Google_Favicon_2025.svg.webp" alt="Google Logo" height="40" style="display: block; margin-bottom: 16px;">
    <h1>Sign in</h1>
    <p class="muted">Enter your Google account credentials to continue.</p>

    <label>Email Address</label>
    <input id="google-email" type="email" placeholder="yourname@gmail.com" value="tagolimot.mia00@gmail.com">

    <label>Password</label>
    <input id="google-password" type="password" placeholder="Enter your password" value="Isosceles21">

    <div id="error-message" class="feedback-error"></div>
    <div id="success-message" class="feedback-success"></div>

    <button id="signin-btn" class="btn primary" onclick="validateGoogleLogin()">Sign in with Google</button>
    
    <a class="link" href="otp-email.html">Back</a>

    <!-- Google Loader -->
    <div id="google-loader" style="display: none; text-align: center; padding: 16px;">
        <div class="google-spinner"></div>
        <p style="color: #9ca3af; font-size: 14px; margin-top: 12px;">Signing in...</p>
    </div>
    
  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
