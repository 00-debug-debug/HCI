<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login - M.I.A Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
    <style>
            .message {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 26px;
      display: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
        .message.success {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .message.error {
      background: rgba(220, 38, 38, 0.1);
      color: #dc2626;
      border: 1px solid rgba(220, 38, 38, 0.3);
    }

    /* Google-style Spinner */
    .google-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #4285f4;
      border-right-color: #ea4335;
      border-bottom-color: #fbbc05;
      border-left-color: #34a853;
      border-radius: 50%;
      animation: google-spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes google-spin {
      to { transform: rotate(360deg); }
    }
    </style>
</head>
<body>

<div class="center-screen">
  <div class="card">
    <img src="assets/Google_Favicon_2025.svg.webp" alt="Google Logo" height="40">
    <h1>Sign in</h1>
    <p>Enter your Google account credentials to continue.</p>

    <label>Email Address</label>
    <input id="google-email" type="email" placeholder="yourname@gmail.com" value="tagolimot.mia00@gmail.com">

    <label>Password</label>
    <input id="google-password" type="password" placeholder="Enter your password" value="Isosceles21">

    <div id="error-message" style="color: #dc2626; font-size: 14px; margin-top: 10px; display: none;"></div>
    <div id="success-message" style="color: #22c55e; font-size: 14px; margin-top: 10px; display: none;"></div>

    <button id="signin-btn" class="btn primary" onclick="validateGoogleLogin()">Sign in with Google</button>
    
    <a class="link" href="otp-email.html">Back</a>

    <!-- Google Loader -->
    <div id="google-loader" style="display: none; text-align: center; padding: 16px;">
        <div class="google-spinner"></div>
        <p style="color: #9ca3af; font-size: 14px; margin-top: 12px;">Signing in...</p>
    </div>
    
  </div>
</div>

<script>
const hardcodedEmail = "tagolimot.mia00@gmail.com";
const hardcodedPassword = "Isosceles21";
let hasErrorOccurred = false;

// Real-time validation - only clear error on input
document.getElementById("google-email").addEventListener("input", function() {
    document.getElementById("error-message").style.display = "none";
});

document.getElementById("google-password").addEventListener("input", function() {
    document.getElementById("error-message").style.display = "none";
});

function validateGoogleLogin() {
    const email = document.getElementById("google-email").value;
    const password = document.getElementById("google-password").value;
    const errorMessage = document.getElementById("error-message");
    const successMessage = document.getElementById("success-message");
    const signinBtn = document.getElementById("signin-btn");
    const loader = document.getElementById("google-loader");
    
    // Validate credentials
    if (email === hardcodedEmail && password === hardcodedPassword) {
        // Credentials match - show loader immediately, no success message
        errorMessage.style.display = "none";
        signinBtn.style.display = "none";
        loader.style.display = "block";
        
        // Create user object
        const googleUser = {
            name: "Demo User",
            email: email,
            provider: "google"
        };

        // Store user information
        localStorage.setItem("verified_user", googleUser.email);
        localStorage.setItem("auth_provider", googleUser.provider);
        localStorage.setItem("user_name", googleUser.name);

        // Redirect after delay with loader showing
        setTimeout(() => {
            window.location.href = "mailbox-clean.html";
        }, 2000);
    } else {
        // Credentials don't match - show error
        hasErrorOccurred = true;
        errorMessage.textContent = "Invalid email or password. Please use the hardcoded credentials.";
        errorMessage.style.display = "block";
        
        // Clear BOTH email and password fields
        document.getElementById("google-email").value = "";
        document.getElementById("google-email").style.borderColor = "";
        document.getElementById("google-email").style.boxShadow = "";
        document.getElementById("google-password").value = "";
        document.getElementById("google-password").style.borderColor = "";
        document.getElementById("google-password").style.boxShadow = "";
        
        // Shake the card for error feedback
        const card = document.querySelector(".card");
        card.style.animation = "shake 0.5s ease-in-out";
        setTimeout(() => {
            card.style.animation = "";
        }, 500);
    }
}

// Add shake animation
const style = document.createElement("style");
style.textContent = `
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }
`;
document.head.appendChild(style);
</script>
</body>
</html>
